name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate JSON and JavaScript
        shell: bash
        run: |
          set -euo pipefail
          node -e 'JSON.parse(require("fs").readFileSync("module.json", "utf8"))'
          for file in lang/*.json; do
            node -e 'JSON.parse(require("fs").readFileSync(process.argv[1], "utf8"))' "$file"
          done
          for file in scripts/*.mjs; do
            node --check "$file"
          done
